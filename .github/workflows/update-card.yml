name: Update GitHub Stats Card

on:
  schedule:
    - cron: "0 0 * * *"   # every day at 00:00 UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab

permissions:
  contents: write

jobs:
  update-card:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Update card with live stats
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: python scripts/update_card.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add github_readme_card_text.svg
          git diff --quiet && git diff --staged --quiet || git commit -m "chore: update GitHub stats card [skip ci]"
          git push
